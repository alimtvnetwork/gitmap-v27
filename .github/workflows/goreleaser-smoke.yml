name: GoReleaser Smoke (cfr cg)

# End-to-end smoke: build a goreleaser snapshot artifact on Linux + macOS,
# extract the archive as an end user would, then run a minimal `cfr cg`
# flow against a throwaway public repo to confirm the release binary:
#   1. runs at all (prints version),
#   2. exposes the `cg` modifier on `cfr` / `cfrp` (helptext contains it),
#   3. can drive a real clone-fix-repo pipeline with `cg` + `--no-commit`
#      + `--no-push` end-to-end without touching remotes.
#
# Runs on PR + main pushes that touch the release surface, and can be
# invoked manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "gitmap/**"
      - ".github/workflows/goreleaser-smoke.yml"
      - ".goreleaser.yaml"
      - "gitmap/.goreleaser.yaml"
  pull_request:
    paths:
      - "gitmap/**"
      - ".github/workflows/goreleaser-smoke.yml"
      - "gitmap/.goreleaser.yaml"
  workflow_dispatch: {}

concurrency:
  group: goreleaser-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  snapshot-smoke:
    name: snapshot build + cfr cg smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Build snapshot via goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: gitmap
          args: release --clean --snapshot --skip=publish

      - name: Locate + extract host archive
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          case "${{ runner.os }}" in
            Linux)  os_tag=linux  ;;
            macOS)  os_tag=darwin ;;
            *) echo "unsupported runner ${{ runner.os }}" >&2; exit 2 ;;
          esac
          arch_tag=amd64
          # goreleaser snapshot names: gitmap-vX.Y.Z-next-<os>-<arch>.tar.gz
          archive=$(ls gitmap/dist/gitmap-*-${os_tag}-${arch_tag}.tar.gz | head -n1)
          echo "archive=$archive"
          test -f "$archive" || { echo "no archive found" >&2; ls -la gitmap/dist >&2; exit 3; }
          workdir="$RUNNER_TEMP/gitmap-smoke"
          mkdir -p "$workdir"
          tar -xzf "$archive" -C "$workdir"
          bin="$workdir/gitmap"
          test -x "$bin" || chmod +x "$bin"
          "$bin" version
          echo "bin=$bin" >> "$GITHUB_OUTPUT"

      - name: Assert `cg` modifier is documented in cfr/cfrp help
        shell: bash
        run: |
          set -euo pipefail
          bin="${{ steps.extract.outputs.bin }}"
          for cmd in cfr cfrp; do
            out=$("$bin" "$cmd" --help 2>&1 || true)
            printf '%s\n' "$out" | grep -qiE '(^|[^a-z])cg([^a-z]|$)' \
              || { echo "::error::'$cmd --help' did not mention the 'cg' modifier"; \
                   printf '%s\n' "$out"; exit 4; }
          done
          echo "OK: cfr + cfrp expose the cg modifier"

      - name: Build local fixture git repo (offline remote)
        id: fixture
        shell: bash
        run: |
          set -euo pipefail
          # Build a fully local "remote" so the smoke test does not depend on
          # github.com being reachable, does not race against upstream branch
          # renames, and gives validation known values for:
          #   * origin URL   (file:// path we control)
          #   * default branch (main, forced via git init -b)
          #   * committed note content (fixture-note.txt marker)
          fixroot="$RUNNER_TEMP/gitmap-fixture"
          rm -rf "$fixroot" && mkdir -p "$fixroot"
          src="$fixroot/src"
          bare="$fixroot/fixture-repo.git"
          mkdir -p "$src"
          (
            cd "$src"
            git init -q -b main
            git config user.email 'smoke@gitmap.local'
            git config user.name  'gitmap smoke'
            printf 'gitmap smoke fixture\n' > README.md
            printf 'FIXTURE_NOTE_MARKER: cfr-cg smoke v1\n' > fixture-note.txt
            git add .
            git commit -q -m 'fixture: initial commit for cfr cg smoke'
          )
          git clone -q --bare "$src" "$bare"
          repo_url="file://$bare"
          echo "repo_url=$repo_url"       >> "$GITHUB_OUTPUT"
          echo "clone_dir=fixture-repo"   >> "$GITHUB_OUTPUT"
          echo "expected_branch=main"     >> "$GITHUB_OUTPUT"

      - name: End-to-end `cfr cg` against local fixture repo
        shell: bash
        env:
          # No remotes required: fixture is a local file:// bare repo, and we
          # pass --no-commit --no-push so nothing is written back either.
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          bin="${{ steps.extract.outputs.bin }}"
          repo_url="${{ steps.fixture.outputs.repo_url }}"
          clone_dir="${{ steps.fixture.outputs.clone_dir }}"
          scratch="$RUNNER_TEMP/cfr-cg-smoke"
          rm -rf "$scratch" && mkdir -p "$scratch"
          cd "$scratch"

          log="$scratch/cfrp-cg.log"

          set +e
          "$bin" cfrp cg "$repo_url" --no-commit --no-push 2>&1 | tee "$log"
          rc=${PIPESTATUS[0]}
          set -e

          if [ $rc -ne 0 ]; then
            echo "::error::cfrp cg exited $rc"
            ls -la
            exit $rc
          fi

          test -d "$clone_dir/.git" || { echo "::error::clone missing at $clone_dir"; ls -la; exit 5; }
          echo "OK: cfrp cg completed end-to-end (rc=$rc)"

      - name: Validate cfr cg outputs (URL / clone cmd / branch / notes)
        shell: bash
        run: |
          set -euo pipefail
          scratch="$RUNNER_TEMP/cfr-cg-smoke"
          cd "$scratch"
          repo_url="${{ steps.fixture.outputs.repo_url }}"
          clone_dir="${{ steps.fixture.outputs.clone_dir }}"
          expected_branch="${{ steps.fixture.outputs.expected_branch }}"
          log="$scratch/cfrp-cg.log"

          fail=0
          assert_contains() { # $1=needle $2=label
            if ! grep -Fq -- "$1" "$log"; then
              echo "::error::stdout missing $2: '$1'"
              fail=1
            else
              echo "  OK stdout contains $2"
            fi
          }

          # 1) Repo URL (file:// fixture path) surfaced in run log.
          assert_contains "$repo_url" 'repo URL'

          # 2) Clone command trace.
          if ! grep -Eq 'git( .*)? clone' "$log"; then
            echo "::error::stdout missing 'git clone' command trace"
            fail=1
          else
            echo "  OK stdout contains clone command"
          fi

          # 3) CG installer + Note section.
          assert_contains 'Installing coding guidelines (v24' 'CG installer banner'
          assert_contains 'Note: --no-commit set' 'no-commit note'
          assert_contains 'Note: --no-push set'   'no-push note'

          # 4) Pipeline completion marker.
          assert_contains 'clone-fix-repo: pipeline completed' 'pipeline done marker'

          # 5) Branch + remote validation against known fixture values.
          branch=$(git -C "$clone_dir" rev-parse --abbrev-ref HEAD)
          echo "  cloned branch=$branch (expected=$expected_branch)"
          if [ "$branch" != "$expected_branch" ]; then
            echo "::error::branch '$branch' != expected '$expected_branch'"
            fail=1
          else
            echo "  OK branch matches fixture"
          fi
          remote=$(git -C "$clone_dir" config --get remote.origin.url)
          echo "  cloned remote=$remote"
          if [ "$remote" != "$repo_url" ]; then
            echo "::error::remote origin '$remote' != '$repo_url'"
            fail=1
          else
            echo "  OK remote origin matches fixture URL"
          fi

          # 5b) Committed note content came through unmodified.
          if ! grep -Fq 'FIXTURE_NOTE_MARKER: cfr-cg smoke v1' "$clone_dir/fixture-note.txt"; then
            echo "::error::fixture-note.txt marker missing in clone"
            fail=1
          else
            echo "  OK fixture note content preserved"
          fi

          # 6) Optional JSON checkpoint sidecar (.gitmap/cfrp/<batch>/state.json).
          state=$(find .gitmap/cfrp -name state.json 2>/dev/null | head -n1 || true)
          if [ -n "$state" ]; then
            echo "  found checkpoint: $state"
            python3 - "$state" "$repo_url" <<'PY'
          import json, sys
          path, url = sys.argv[1], sys.argv[2]
          cp = json.load(open(path))
          assert cp.get('batch_id'), 'batch_id empty'
          done = cp.get('done') or []
          assert any(url in d for d in done), f'done[] missing {url}: {done!r}'
          assert cp.get('total', 0) >= 1, 'total < 1'
          print(f'  OK checkpoint validated (batch_id={cp["batch_id"]}, done={len(done)})')
          PY
          else
            echo '  note: no checkpoint sidecar emitted (single-URL run), skipping JSON validation'
          fi

          [ $fail -eq 0 ] || { echo '::error::output validation failed'; exit 6; }
          echo 'OK: all cfr cg output fields validated'

  snapshot-smoke-windows:
    name: snapshot build + cfr cg smoke (windows-latest amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: gitmap/go.mod
          cache-dependency-path: gitmap/go.sum

      - name: Build snapshot via goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: gitmap
          args: release --clean --snapshot --skip=publish

      - name: Locate + extract host archive (windows amd64)
        id: extract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # goreleaser snapshot names: gitmap-vX.Y.Z-next-windows-amd64.zip
          $archive = Get-ChildItem -Path gitmap/dist -Filter 'gitmap-*-windows-amd64.zip' `
            | Select-Object -First 1
          if (-not $archive) {
            Write-Host '::error::no windows-amd64 archive found'
            Get-ChildItem gitmap/dist | Format-Table -AutoSize
            exit 3
          }
          Write-Host "archive=$($archive.FullName)"
          $workdir = Join-Path $env:RUNNER_TEMP 'gitmap-smoke'
          New-Item -ItemType Directory -Force -Path $workdir | Out-Null
          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $workdir -Force
          $bin = Join-Path $workdir 'gitmap.exe'
          if (-not (Test-Path $bin)) {
            Write-Host '::error::gitmap.exe missing after extract'
            Get-ChildItem $workdir -Recurse | Format-Table -AutoSize
            exit 3
          }
          & $bin version
          "bin=$bin" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Assert `cg` modifier is documented in cfr/cfrp help
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = '${{ steps.extract.outputs.bin }}'
          foreach ($cmd in @('cfr','cfrp')) {
            $out = & $bin $cmd --help 2>&1 | Out-String
            if ($out -notmatch '(^|[^a-zA-Z])cg([^a-zA-Z]|$)') {
              Write-Host "::error::'$cmd --help' did not mention the 'cg' modifier"
              Write-Host $out
              exit 4
            }
          }
          Write-Host 'OK: cfr + cfrp expose the cg modifier'

      - name: End-to-end `cfr cg` against throwaway public repo
        shell: pwsh
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          $ErrorActionPreference = 'Stop'
          $bin = '${{ steps.extract.outputs.bin }}'
          $scratch = Join-Path $env:RUNNER_TEMP 'cfr-cg-smoke'
          if (Test-Path $scratch) { Remove-Item -Recurse -Force $scratch }
          New-Item -ItemType Directory -Force -Path $scratch | Out-Null
          Set-Location $scratch

          $repoUrl = 'https://github.com/octocat/Hello-World'
          $log = Join-Path $scratch 'cfrp-cg.log'

          & $bin cfrp cg $repoUrl --no-commit --no-push *>&1 | Tee-Object -FilePath $log
          $rc = $LASTEXITCODE
          if ($rc -ne 0) {
            Write-Host "::error::cfrp cg exited $rc"
            Get-ChildItem | Format-Table -AutoSize
            exit $rc
          }
          if (-not (Test-Path 'Hello-World/.git')) {
            Write-Host '::error::clone missing'
            Get-ChildItem | Format-Table -AutoSize
            exit 5
          }
          Write-Host "OK: cfrp cg completed end-to-end (rc=$rc)"

      - name: Validate cfr cg outputs (URL / clone cmd / branch / notes)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scratch = Join-Path $env:RUNNER_TEMP 'cfr-cg-smoke'
          Set-Location $scratch
          $repoUrl = 'https://github.com/octocat/Hello-World'
          $log = Join-Path $scratch 'cfrp-cg.log'
          $text = Get-Content -Raw -LiteralPath $log
          $fail = 0

          function Assert-Contains($needle, $label) {
            if ($script:text -notmatch [regex]::Escape($needle)) {
              Write-Host "::error::stdout missing $label`: '$needle'"
              $script:fail = 1
            } else {
              Write-Host "  OK stdout contains $label"
            }
          }

          # 1) Repo URL surfaced in the run log.
          Assert-Contains $repoUrl 'repo URL'

          # 2) Clone command trace.
          if ($text -notmatch 'git(\s.*)?\s+clone') {
            Write-Host "::error::stdout missing 'git clone' command trace"
            $fail = 1
          } else {
            Write-Host '  OK stdout contains clone command'
          }

          # 3) CG installer + Note section (MsgCGRunningWindows, MsgCGSkipCommit, MsgCGSkipPush).
          Assert-Contains 'Installing coding guidelines (v24' 'CG installer banner'
          Assert-Contains 'Note: --no-commit set' 'no-commit note'
          Assert-Contains 'Note: --no-push set'   'no-push note'

          # 4) Pipeline completion marker (MsgCloneFixRepoDone).
          Assert-Contains 'clone-fix-repo: pipeline completed' 'pipeline done marker'

          # 5) Branch + remote validation.
          $branch = (& git -C Hello-World rev-parse --abbrev-ref HEAD).Trim()
          Write-Host "  cloned branch=$branch"
          if ($branch -notin @('master','main')) {
            Write-Host "::error::unexpected branch '$branch'"; $fail = 1
          } else { Write-Host "  OK branch is $branch" }
          $remote = (& git -C Hello-World config --get remote.origin.url).Trim()
          Write-Host "  cloned remote=$remote"
          if ($remote -ne $repoUrl -and $remote -ne "$repoUrl.git") {
            Write-Host "::error::remote origin '$remote' != '$repoUrl'"
            $fail = 1
          } else { Write-Host '  OK remote origin matches' }

          # 6) Optional JSON checkpoint sidecar.
          $state = Get-ChildItem -Path .gitmap/cfrp -Recurse -Filter state.json -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($state) {
            Write-Host "  found checkpoint: $($state.FullName)"
            $cp = Get-Content -Raw -LiteralPath $state.FullName | ConvertFrom-Json
            if (-not $cp.batch_id) { Write-Host '::error::batch_id empty'; $fail = 1 }
            $done = @($cp.done)
            if (-not ($done | Where-Object { $_ -like "*$repoUrl*" })) {
              Write-Host "::error::done[] missing $repoUrl (got: $($done -join ','))"
              $fail = 1
            }
            if (($cp.total -as [int]) -lt 1) { Write-Host '::error::total < 1'; $fail = 1 }
            Write-Host "  OK checkpoint validated (batch_id=$($cp.batch_id), done=$($done.Count))"
          } else {
            Write-Host '  note: no checkpoint sidecar emitted (single-URL run), skipping JSON validation'
          }

          if ($fail -ne 0) { Write-Host '::error::output validation failed'; exit 6 }
          Write-Host 'OK: all cfr cg output fields validated'
