# goreleaser config for gitmap.
# Run locally: cd gitmap && goreleaser release --clean --snapshot
version: 2

project_name: gitmap

before:
  hooks:
    - go mod tidy

builds:
  - id: gitmap
    main: .
    binary: gitmap
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/alimtvnetwork/gitmap-v27/gitmap/constants.Version={{ .Version }}'
      - -X 'github.com/alimtvnetwork/gitmap-v27/gitmap/cmd.BuildCommit={{ .FullCommit }}'
      - -X 'github.com/alimtvnetwork/gitmap-v27/gitmap/cmd.BuildDate={{ .Date }}'
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
  mode: replace
  name_template: "gitmap v{{ .Version }}"
